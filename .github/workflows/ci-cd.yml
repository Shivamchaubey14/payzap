name: PayZap CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install lint dependencies
        run: |
          pip install ruff bandit

      - name: Run ruff (linter + formatter check)
        run: ruff check . --output-format=github

      - name: Run bandit (security static analysis)
        run: bandit -r . -x ./venv,./tests -ll

  # ── Job 2: Test ────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: payzap_test
          POSTGRES_USER: payzap
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          SECRET_KEY: ci-test-secret-key-not-used-in-prod
          DEBUG: "True"
          DB_NAME: payzap_test
          DB_USER: payzap
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-test-secret-key-not-used-in-prod
          DEBUG: "True"
          DB_NAME: payzap_test
          DB_USER: payzap
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=44 \
            -p no:warnings

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Job 3: Build & Push Docker Image ──────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ github.sha }}

  # ── Job 4: Deploy to Production ───────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.payzap.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image tag in deployment
        run: |
          kubectl set image deployment/payzap-api \
            payzap-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            -n payzap

          kubectl set image deployment/payzap-celery-worker \
            celery-worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            -n payzap

          kubectl set image deployment/payzap-celery-beat \
            celery-beat=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            -n payzap

      - name: Wait for rolling update to complete
        run: |
          kubectl rollout status deployment/payzap-api -n payzap --timeout=300s
          kubectl rollout status deployment/payzap-celery-worker -n payzap --timeout=300s
          kubectl rollout status deployment/payzap-celery-beat -n payzap --timeout=300s

      - name: Run post-deploy smoke test
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.payzap.com/monitoring/health/)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed — health check returned HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed — health check returned HTTP 200"

      - name: Auto-rollback on failure
        if: failure()
        run: |
          echo "Deploy or smoke test failed — rolling back..."
          kubectl rollout undo deployment/payzap-api -n payzap
          kubectl rollout undo deployment/payzap-celery-worker -n payzap
          kubectl rollout undo deployment/payzap-celery-beat -n payzap
          kubectl rollout status deployment/payzap-api -n payzap --timeout=120s
          echo "Rollback complete"