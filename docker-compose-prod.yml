version: '3.9'

services:
  web:
    build:
      context: .
      target: runtime
    image: payzap:latest
    restart: always
    ports:
      - "8000:8000"
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - logs:/app/logs
    networks:
      - payzap_net
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  celery_worker:
    build:
      context: .
      target: runtime
    image: payzap:latest
    restart: always
    command: celery -A payzap_core worker -l info -Q default,payments,webhooks -c 4
    env_file: .env.prod
    depends_on:
      - db
      - redis
    volumes:
      - logs:/app/logs
    networks:
      - payzap_net
    deploy:
      replicas: 2

  celery_beat:
    build:
      context: .
      target: runtime
    image: payzap:latest
    restart: always
    command: celery -A payzap_core beat -l info --scheduler celery.beat:PersistentScheduler
    env_file: .env.prod
    depends_on:
      - db
      - redis
    networks:
      - payzap_net
    deploy:
      replicas: 1

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: payzap
      POSTGRES_USER: payzap
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=4GB
      -c effective_cache_size=12GB
      -c work_mem=64MB
      -c maintenance_work_mem=512MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=64MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c min_wal_size=2GB
      -c max_wal_size=8GB
      -c max_worker_processes=8
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - payzap_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payzap"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appenfsync everysec
      --save ""
      --tcp-backing 511
      --hz 100

    volumes:
      - redis_data:/data
    networks:
      - payzap_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - payzap_net

volumes:
  postgres_data:
  redis_data:
  static_files:
  logs:

networks:
  payzap_net:
    driver: bridge